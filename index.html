<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cookie Clicker</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kavoon&family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="brand">🍪 Cookie Clicker RP</div>
      <div class="top-actions">
        <span id="saveStatus">💾 Sauvegarde locale</span>
        <button id="exportBtn" class="small-btn">Exporter</button>
        <button id="importBtn" class="small-btn">Importer</button>
        <button id="resetBtn" class="danger-btn">Reset</button>
      </div>
    </header>

    <div class="news"><span id="newsText">Bienvenue dans Cookie Clicker RP • Version optimisée pour tablette GTA RP •</span></div>

    <main class="layout">
      <section class="left panel">
        <div class="countbox">
          <div id="cookieCount" class="cookie-count">0</div>
          <div class="label">cookies</div>
          <div id="cps" class="sub">0 / seconde</div>
          <div id="cpc" class="sub">+1 / clic</div>
        </div>

        <button id="cookieBtn" class="cookie" aria-label="Cliquer cookie">🍪</button>

        <div class="audio-box">
          <label>🔊 Volume clic</label>
          <input id="volume" type="range" min="0" max="100" value="35" />
        </div>
      </section>

      <section class="middle panel">
        <h2>📊 Statistiques</h2>
        <div class="stats-grid">
          <div>Total cuit <b id="totalBaked">0</b></div>
          <div>Clics <b id="totalClicks">0</b></div>
          <div>Temps joué <b id="playTime">0s</b></div>
          <div>Succès <b id="achCount">0/0</b></div>
        </div>

        <h2>🏆 Succès</h2>
        <div id="achievements" class="achievements"></div>

        <h2>📰 Journal</h2>
        <div id="log" class="log"></div>
      </section>

      <section class="right panel">
        <div class="buy-modes">
          <button class="mode active" data-mode="1">x1</button>
          <button class="mode" data-mode="10">x10</button>
          <button class="mode" data-mode="100">x100</button>
          <button class="mode" data-mode="max">MAX</button>
        </div>
        <div id="shop" class="shop"></div>
      </section>
    </main>
  </div>

  <div id="floatLayer"></div>
  <div id="toastLayer"></div>

  <script src="game.js"></script>
  <div class="credits">developped by Raul Lyon</div>
</body>
</html>
