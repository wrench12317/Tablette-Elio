<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Cookie Clicker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">🍪 Cookie Clicker</div>
    <div class="actions">
      <span id="saveStatus">💾 Sauvegarde locale</span>
      <button id="exportBtn">Exporter</button>
      <button id="importBtn">Importer</button>
      <button id="resetBtn" class="danger">Reset</button>
    </div>
  </header>
  <div class="news"><span id="newsText">Bienvenue dans Cookie Clicker •</span></div>

  <main class="layout">
    <section class="left">
      <div class="counter">
        <div id="cookieCount">0</div>
        <div>cookies</div>
        <small id="cps">0 / seconde</small>
        <small id="cpc">+1 / clic</small>
      </div>
      <button id="cookieBtn" aria-label="cookie"></button>
      <div class="volumeBox">
        <label>🔊 Volume clic</label>
        <input id="volume" type="range" min="0" max="100" value="35">
      </div>
    </section>

    <section class="center">
      <h2>📊 Statistiques</h2>
      <div class="statsGrid">
        <div>Total cuit<br><b id="totalBaked">0</b></div>
        <div>Clics<br><b id="totalClicks">0</b></div>
        <div>Temps joué<br><b id="playTime">0s</b></div>
        <div>Succès<br><b id="achCount">0/6</b></div>
      </div>

      <h2>🏆 Succès</h2>
      <div id="achievements" class="achievements"></div>

      <h2>📰 Journal</h2>
      <div id="log" class="log"></div>
    </section>

    <section class="right">
      <div class="modes">
        <button class="mode active" data-mode="1">x1</button>
        <button class="mode" data-mode="10">x10</button>
        <button class="mode" data-mode="100">x100</button>
        <button class="mode" data-mode="max">MAX</button>
      </div>
      <div class="upgradeTitle">Améliorations</div>
      <div id="upgrades" class="upgrades"></div>
      <div class="upgradeTitle">Boutique</div>
      <div id="shop" class="shop"></div>
    </section>
  </main>

  <div id="floatLayer"></div>
  <div id="toastLayer"></div>
  <div class="credits">developped by Raul Lyon</div>
  <script src="game.js"></script>
</body>
</html>
